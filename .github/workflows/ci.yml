name: ci

on:
  push:
    branches: [main]
    tags: ["**"]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

  # rebuild weekly
  schedule:
    - cron: 0 0 * * 0

  workflow_call:
    inputs:
      push_image:
        description: Push image
        required: false
        default: false
        type: boolean

  workflow_dispatch:
    inputs:
      push_image:
        description: Push image
        required: false
        default: false
        type: boolean

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

jobs:
  bake-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.bake-matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: compose.yaml
          persist-credentials: false

      - id: bake-matrix
        uses: docker/bake-action/subaction/matrix@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7

  docker-bake:
    permissions:
      packages: write

    needs: [bake-matrix]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.bake-matrix.outputs.matrix) }}

    runs-on: ubuntu-latest
    env:
      PUSH_IMAGE: ${{ github.event_name == 'push' || inputs.push_image == true }}
    steps:
      - if: ${{ fromJson(env.PUSH_IMAGE) }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: compose.yaml
          persist-credentials: false

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - if: ${{ fromJson(env.PUSH_IMAGE) }}
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - id: bake
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7
        with:
          targets: ${{ matrix.target }}
          load: ${{ ! fromJson(env.PUSH_IMAGE) }}
          push: ${{ env.PUSH_IMAGE }}
          provenance: ${{ env.PUSH_IMAGE }}
          sbom: ${{ env.PUSH_IMAGE }}

      - run: docker run "${IMAGE_TAG}" uv pip list
        env:
          IMAGE_TAG: ${{ fromJson(steps.bake.outputs.metadata)[matrix.target]['image.name'] }}
