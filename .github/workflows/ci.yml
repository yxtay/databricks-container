name: ci

on:
  push:
    branches: [main]
    tags: ["**"]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

  # rebuild weekly
  schedule:
    - cron: 0 0 * * 0

  workflow_call:
    inputs:
      push_image:
        description: Push image
        required: false
        default: false
        type: boolean

  workflow_dispatch:
    inputs:
      push_image:
        description: Push image
        required: false
        default: false
        type: boolean

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

jobs:
  bake-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.bake-matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          sparse-checkout: compose.yaml
          persist-credentials: false

      - id: bake-matrix
        uses: docker/bake-action/subaction/matrix@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7

  docker-bake:
    permissions:
      packages: write

    needs: [bake-matrix]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.bake-matrix.outputs.matrix) }}

    runs-on: ubuntu-latest
    env:
      PUSH_IMAGE: ${{ github.event_name == 'push' || inputs.push_image == true }}
    steps:
      - if: ${{ fromJson(env.PUSH_IMAGE) }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          sparse-checkout: compose.yaml
          persist-credentials: false

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - if: ${{ fromJson(env.PUSH_IMAGE) }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - id: bake
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7
        with:
          targets: ${{ matrix.target }}
          load: ${{ ! fromJson(env.PUSH_IMAGE) }}
          push: ${{ env.PUSH_IMAGE }}
          provenance: ${{ env.PUSH_IMAGE }}
          sbom: ${{ env.PUSH_IMAGE }}

      - run: docker run "${IMAGE_TAG}" uv pip list
        env:
          IMAGE_TAG: ${{ fromJson(steps.bake.outputs.metadata)[matrix.target]['image.name'] }}
